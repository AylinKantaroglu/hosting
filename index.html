<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host-Planer Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; }
        .welcome-banner { background: linear-gradient(135deg, var(--primary), #818cf8); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 15px rgba(99,102,241,0.2); }
        .host-now { font-size: 1.8rem; font-weight: 900; display: block; margin: 10px 0; }
        .user-card { background: var(--card); padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; }
        .stat-box { background: #f1f5f9; padding: 8px; border-radius: 10px; text-align: center; font-size: 0.85rem; }
        .event-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .event-card.is-help { border-left-color: var(--danger); background: #fff5f5; }
        .date-info b { display: block; color: var(--primary); }
        button { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        .btn-ok { background: var(--primary); color: white; }
        .btn-give { background: #fee2e2; color: var(--danger); }
        .btn-done { background: #dcfce7; color: #166534; }
        .btn-take { background: var(--success); color: white; }
        .me-badge { background: var(--primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="banner"></div>

    <div class="user-card">
        <div class="input-group">
            <input type="text" id="userName" placeholder="Dein Name...">
            <button class="btn-ok" onclick="saveUser()">Login</button>
        </div>
        <div id="stats" class="stats-grid"></div>
    </div>

    <div id="liste" class="timeline">Lade Planer...</div>
</div>

<script>
    const SUPABASE_URL = "https://ithgjzvwwrxmdrxzynoi.supabase.co";
    const SUPABASE_KEY = "DEIN_KEY_HIER";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = localStorage.getItem("host_user") || "";
    document.getElementById("userName").value = currentUser;

    // Feste Reihenfolge – ändert sich NIE
    const reihenfolge = ["ayca", "reyyan", "esma", "büsra", "fatima", "merve aylin", "aise"];

    // Start-Donnerstag (erster Termin)
    const startDonnerstag = new Date("2025-03-27");

    function getDonnerstag(weekIndex) {
        const d = new Date(startDonnerstag);
        d.setDate(d.getDate() + weekIndex * 7);
        return d;
    }

    // Fester Slot-Host (immer aus der Reihenfolge, unabhängig von Tausch)
    function getSlotHost(weekIndex) {
        return reihenfolge[weekIndex % reihenfolge.length];
    }

    function saveUser() {
        currentUser = document.getElementById("userName").value.trim().toLowerCase();
        localStorage.setItem("host_user", currentUser);
        render();
    }

    // „Ich habe gehostet“ → Punkt für tatsächlichen Host
    async function hostErledigt(weekIndex) {
        const slotHost = getSlotHost(weekIndex);

        const { data: row } = await client
            .from("termine")
            .select("*")
            .eq("week_index", weekIndex)
            .maybeSingle();

        const neuerStand = (row?.hosting_count || 0) + 1;

        await client.from("termine").upsert({
            week_index: weekIndex,
            host: row?.host || currentUser || slotHost, // tatsächlicher Host
            tausch_partner: row?.tausch_partner || slotHost, // optional: ursprünglicher Slot-Host
            status: "confirmed",
            hosting_count: neuerStand
        });

        alert("Masallah! 1 Punkt wurde eingetragen.");
        render();
    }

    // „Ich kann nicht“ → Slot bleibt, aber sucht Ersatz
    async function hilfeAnfordern(weekIndex) {
        const slotHost = getSlotHost(weekIndex);

        // wir markieren nur, dass Hilfe gebraucht wird
        await client.from("termine").upsert({
            week_index: weekIndex,
            status: "hilfe",
            host: null,
            tausch_partner: slotHost
        });

        render();
    }

    // „Ich übernehme“ → tatsächlicher Host wird gesetzt
    async function übernehmen(weekIndex) {
        if (!currentUser) return alert("Bitte Namen eingeben!");

        const slotHost = getSlotHost(weekIndex);

        await client.from("termine").upsert({
            week_index: weekIndex,
            host: currentUser,        // tatsächlicher Host
            tausch_partner: slotHost, // ursprünglicher Slot-Host
            status: "confirmed"
        });

        render();
    }

    async function render() {
        const heute = new Date();
        heute.setHours(0,0,0,0);

        const diff = Math.floor((heute - startDonnerstag) / (7 * 24 * 60 * 60 * 1000));
        const aktuelleWoche = Math.max(0, diff);

        const { data: termine } = await client.from("termine").select("*");

        // Statistik: Punkte pro tatsächlichem Host
        const statsHTML = reihenfolge.map(name => {
            const punkte = termine
                ?.filter(t => (t.host || "").toLowerCase().trim() === name.toLowerCase())
                ?.reduce((sum, t) => sum + (t.hosting_count || 0), 0) || 0;

            return `<div class="stat-box"><span>${name}</span><b>${punkte}x</b></div>`;
        }).join("");

        document.getElementById("stats").innerHTML = statsHTML;

        let listeHTML = "";
        let bannerSet = false;

        for (let i = 0; i < 10; i++) {
            const weekIndex = aktuelleWoche + i;
            const datum = getDonnerstag(weekIndex);

            const slotHost = getSlotHost(weekIndex); // fester Plan-Host
            const override = termine?.find(t => t.week_index === weekIndex);

            const status = override?.status || "planned";
            const actualHost = override?.host || null; // wer wirklich übernimmt / gehostet hat
            const brauchtHilfe = status === "hilfe";
            const istSlotHost = currentUser && currentUser === slotHost;
            const istActualHost = currentUser && currentUser === actualHost;

            // Anzeige-Host:
            // - wenn jemand übernommen hat → actualHost
            // - sonst → slotHost
            const displayHost = actualHost || slotHost;

            // Banner für diese Woche
            if (!bannerSet && i === 0) {
                document.getElementById("banner").innerHTML = `
                    <div class="welcome-banner">
                        <h2>Hoster der Woche (${datum.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' })})</h2>
                        <span class="host-now">${displayHost.toUpperCase()}</span>
                        <p>hele şükür!</p>
                    </div>`;
                bannerSet = true;
            }

            listeHTML += `
                <div class="event-card ${brauchtHilfe ? 'is-help' : ''}">
                    <div class="date-info">
                        <b>${datum.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' })}</b>
                        <span>Host: ${displayHost} ${istActualHost || istSlotHost ? '<span class="me-badge">DU</span>' : ''}</span>
                        ${brauchtHilfe ? '<br><small style="color:red">kann nicht hosten! (sucht Ersatz)</small>' : ''}
                        ${actualHost && actualHost !== slotHost ? `<br><small>übernommen von: ${actualHost}</small>` : ''}
                    </div>
                    <div style="display:flex; gap:5px">
                        ${istSlotHost && !brauchtHilfe && !actualHost ? `<button class="btn-give" onclick="hilfeAnfordern(${weekIndex})">Ich kann nicht</button>` : ''}
                        ${istActualHost ? `<button class="btn-done" onclick="hostErledigt(${weekIndex})">Ich habe gehostet</button>` : ''}
                        ${brauchtHilfe && !istSlotHost && !istActualHost ? `<button class="btn-take" onclick="übernehmen(${weekIndex})">Ich übernehme</button>` : ''}
                    </div>
                </div>`;
        }

        document.getElementById("liste").innerHTML = listeHTML;
    }

    render();
</script>
</body>
</html>
